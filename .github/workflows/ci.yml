name: CI

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run local CI pipeline
        run: npm run validate

      - name: Verify committed dist bundle is up to date
        shell: bash
        run: |
          if ! git diff --exit-code -- dist/index.js; then
            echo "::error::dist/index.js is out of date. Run 'npm run build' and commit the updated bundle."
            exit 1
          fi
